services:
  db:
    image: postgres:15
    container_name: homebase_db
    environment:
      POSTGRES_USER: homebase_user
      POSTGRES_PASSWORD: homebase_password
      POSTGRES_DB: homebase
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: homebase_backend
    environment:
      DATABASE_URL: postgresql://homebase_user:homebase_password@db:5432/homebase
      SECRET_KEY: your-secret-key-here
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - db      

volumes:
  postgres_data: