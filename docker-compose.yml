services:
  db:
    image: postgres:15
    container_name: homebase_db
    environment:
      POSTGRES_USER: homebase_user
      POSTGRES_PASSWORD: homebase_password
      POSTGRES_DB: homebase
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: