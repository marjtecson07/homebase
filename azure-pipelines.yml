trigger:
  branches:
    include:
      - main
  paths:
    include:
      - backend/**
      - azure-pipelines.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: homebase-prod
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - stage: Test
    displayName: 'Run Tests'
    jobs:
      - job: TestJob
        displayName: 'Test and Lint'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r backend/requirements.txt
            displayName: 'Install dependencies'

          - script: |
              cd backend
              ruff check .
            displayName: 'Run linter'

          - script: |
              cd backend
              pytest --cov=app --cov-report=xml --cov-report=term-missing
            displayName: 'Run tests'
            env:
              DATABASE_URL: "sqlite://"
              SECRET_KEY: "test-secret-key-for-ci"
              ALGORITHM: "HS256"
              ACCESS_TOKEN_EXPIRE_MINUTES: "30"

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: 'backend/coverage.xml'
            displayName: 'Publish coverage report'

  - stage: Build
    displayName: 'Build and Push Docker Image'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildJob
        displayName: 'Build Backend'
        steps:
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: homebaseregistry

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              repository: homebase-backend
              dockerfile: backend/Dockerfile
              buildContext: backend
              arguments: '--platform linux/amd64'
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Push Docker Image'
            inputs:
              command: push
              repository: homebase-backend
              tags: |
                $(imageTag)
                latest

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployBackend
        displayName: 'Deploy to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: 'azure-homebase'
                    appName: $(WEBAPP_NAME)
                    containers: >
                      homebaseregistry.azurecr.io/homebase-backend:$(imageTag)