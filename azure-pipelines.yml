trigger:
  branches:
    include:
      - main
  paths:
    include:
      - backend/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: homebase-prod
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: BuildJob
        displayName: 'Build Backend'
        steps:
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: homebaseregistry

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              repository: homebase-backend
              dockerfile: backend/Dockerfile
              buildContext: backend
              arguments: '--platform linux/amd64'
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Push Docker Image'
            inputs:
              command: push
              repository: homebase-backend
              tags: |
                $(imageTag)
                latest

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployBackend
        displayName: 'Deploy to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: 'azure-homebase'
                    appName: $(WEBAPP_NAME)
                    containers: >
                      homebaseregistry.azurecr.io/homebase-backend:$(imageTag)